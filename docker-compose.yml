services:
  app:
    build: .
    ports:
      - '3000:3000'
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      - DB_PATH=/app/data/messages.db
    depends_on:
      - evolution
    restart: unless-stopped

  evolution:
    image: atendai/evolution-api:latest
    ports:
      - '8080:8080'
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - WEBHOOK_GLOBAL_URL=http://app:3000/webhook/messages
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_EVENTS=MESSAGES_UPSERT
    volumes:
      - evolution_data:/evolution/instances
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  evolution_data:
  redis_data:
